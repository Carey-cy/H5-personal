<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>公众号文章索引</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f5f5f5;
            color: #333;
            min-height: 100vh;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px 16px;
            background-color: #fff;
            min-height: 100vh;
        }
        /* 头部 */
        .header {
            text-align: center;
            padding: 30px 0 20px;
            border-bottom: 1px solid #eee;
            margin-bottom: 25px;
        }
        .header h1 {
            font-size: 24px;
            font-weight: 600;
            color: #1a1a1a;
            letter-spacing: 1px;
        }
        .header p {
            font-size: 13px;
            color: #999;
            margin-top: 6px;
        }
        /* 分类网格 */
        .category-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }
        .category-card {
            background: #ffffff;
            border: 1px solid #e8e8e8;
            border-radius: 12px;
            padding: 20px 10px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
            transition: all 0.2s ease;
            cursor: pointer;
            word-break: break-word;
        }
        .category-card:active {
            transform: scale(0.97);
            background-color: #f9f9f9;
            border-color: #d0d0d0;
        }
        .category-card .icon {
            font-size: 28px;
            margin-bottom: 8px;
        }
        .category-card .name {
            font-size: 16px;
            font-weight: 500;
            color: #2c3e50;
        }
        /* 文章列表 */
        .back-btn {
            display: inline-block;
            padding: 8px 16px;
            font-size: 15px;
            color: #576b95;
            margin-bottom: 20px;
            cursor: pointer;
            border-radius: 20px;
            background: #f0f3fa;
            border: none;
        }
        .back-btn:active {
            background: #e1e6f0;
        }
        .category-title {
            font-size: 22px;
            font-weight: 600;
            margin: 10px 0 20px;
            padding-bottom: 12px;
            border-bottom: 2px solid #f0f0f0;
        }
        .article-list {
            list-style: none;
        }
        .article-item {
            padding: 16px 12px;
            border-bottom: 1px solid #f5f5f5;
            transition: background 0.1s;
            cursor: pointer;
        }
        .article-item:active {
            background-color: #f9f9f9;
        }
        .article-item a {
            text-decoration: none;
            color: #2c3e50;
            font-size: 16px;
            font-weight: 500;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .article-item .arrow {
            color: #b0b0b0;
            font-size: 16px;
            margin-left: 8px;
            flex-shrink: 0;
        }
        .empty-tip {
            text-align: center;
            color: #aaa;
            padding: 60px 0;
            font-size: 15px;
        }
        /* 管理入口 */
        .admin-entry {
            text-align: center;
            margin-top: 30px;
            padding: 20px 0;
            color: #ccc;
            font-size: 13px;
            cursor: pointer;
            border-top: 1px solid #f0f0f0;
        }
        .admin-entry:active {
            color: #999;
        }
        /* 管理面板 */
        .admin-panel {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: white;
            z-index: 100;
            overflow-y: auto;
            padding: 20px 16px;
            display: none;
            flex-direction: column;
        }
        .admin-panel.active {
            display: flex;
        }
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid #eee;
        }
        .admin-header h3 {
            font-size: 20px;
            font-weight: 600;
        }
        .close-admin {
            font-size: 26px;
            cursor: pointer;
            color: #888;
            padding: 0 10px;
        }
        .admin-section {
            margin-bottom: 30px;
        }
        .admin-section h4 {
            font-size: 16px;
            margin-bottom: 12px;
            color: #555;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .input-group {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        .input-group input {
            flex: 1;
            min-width: 120px;
            padding: 12px 14px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 15px;
            background: #fafafa;
            outline: none;
            transition: border 0.2s;
        }
        .input-group input:focus {
            border-color: #07c160;
            background: #fff;
        }
        .btn {
            padding: 10px 18px;
            background: #07c160;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
        }
        .btn:active {
            background: #06ad56;
        }
        .btn-outline {
            background: white;
            color: #07c160;
            border: 1px solid #07c160;
        }
        .btn-danger {
            background: #ee5a5a;
            border: 1px solid #ee5a5a;
        }
        .category-list, .article-admin-list {
            list-style: none;
            margin-top: 10px;
        }
        .category-list li, .article-admin-list li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 10px;
            background: #f9f9f9;
            border-radius: 8px;
            margin-bottom: 8px;
            font-size: 15px;
        }
        .admin-badge {
            font-size: 12px;
            background: #e0e0e0;
            padding: 2px 8px;
            border-radius: 10px;
            margin-left: 8px;
        }
        .flex-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .small-btn {
            padding: 5px 12px;
            font-size: 13px;
            border-radius: 6px;
            border: 1px solid #ddd;
            background: white;
            cursor: pointer;
        }
        .small-btn.danger {
            color: #ee5a5a;
            border-color: #ee5a5a;
        }
        .password-modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 200;
            display: none;
        }
        .password-modal.active {
            display: flex;
        }
        .password-box {
            background: white;
            border-radius: 16px;
            padding: 25px 20px;
            width: 280px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }
        .password-box input {
            width: 100%;
            padding: 12px;
            margin: 15px 0;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            outline: none;
        }
        .note {
            font-size: 12px;
            color: #999;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container" id="app">
        <!-- 主视图：分类列表 -->
        <div id="view-categories">
            <div class="header">
                <h1>📚 文章索引</h1>
                <p>点击分类浏览往期内容</p>
            </div>
            <div class="category-grid" id="categoryGrid"></div>
            <div class="admin-entry" id="openAdminBtn">⚙️ 管理</div>
        </div>

        <!-- 文章列表视图（隐藏） -->
        <div id="view-articles" style="display: none;">
            <button class="back-btn" id="backToCategories">← 返回分类</button>
            <div class="category-title" id="currentCategoryName"></div>
            <ul class="article-list" id="articleList"></ul>
            <div class="empty-tip" id="emptyArticles" style="display: none;">暂无文章</div>
        </div>
    </div>

    <!-- 管理面板 -->
    <div class="admin-panel" id="adminPanel">
        <div class="admin-header">
            <h3>📝 内容管理</h3>
            <span class="close-admin" id="closeAdminBtn">✕</span>
        </div>
        <div class="admin-section">
            <h4>📁 分类管理</h4>
            <div class="input-group">
                <input type="text" id="newCategoryName" placeholder="输入分类名称">
                <button class="btn" id="addCategoryBtn">添加分类</button>
            </div>
            <ul class="category-list" id="adminCategoryList"></ul>
        </div>
        <div class="admin-section" id="articleAdminSection" style="display: none;">
            <h4>📄 管理【<span id="adminCurrentCat"></span>】的文章</h4>
            <div class="input-group">
                <input type="text" id="newArticleTitle" placeholder="文章标题">
                <input type="url" id="newArticleUrl" placeholder="公众号链接 https://...">
                <button class="btn" id="addArticleBtn">添加</button>
            </div>
            <ul class="article-admin-list" id="adminArticleList"></ul>
            <button class="btn btn-outline" id="backToCatList" style="margin-top:10px;">← 选择其他分类</button>
        </div>
    </div>

    <!-- 密码弹窗 -->
    <div class="password-modal" id="passwordModal">
        <div class="password-box">
            <h3>管理验证</h3>
            <input type="password" id="passwordInput" placeholder="请输入管理密码">
            <button class="btn" id="confirmPassword">确 认</button>
            <div class="note" id="pwdError" style="color:#ee5a5a; display:none;">密码错误</div>
        </div>
    </div>

    <script>
        (function() {
            // 默认管理密码 (可自行修改)
            const ADMIN_PASSWORD = 'dragonyang27';
            
            // 数据存储键名
            const STORAGE_KEY = 'wx_article_index_data';
            
            // 初始示例数据
            const DEFAULT_DATA = {
                categories: [
                    {
                        id: '1',
                        name: '运营干货',
                        articles: [
                            { id: 'a1', title: '新手公众号排版指南', url: 'https://mp.weixin.qq.com/s/example1' },
                            { id: 'a2', title: '如何写出爆款标题', url: 'https://mp.weixin.qq.com/s/example2' }
                        ]
                    },
                    {
                        id: '2',
                        name: '产品动态',
                        articles: [
                            { id: 'b1', title: '新版本功能介绍', url: 'https://mp.weixin.qq.com/s/example3' }
                        ]
                    }
                ]
            };

            // 当前状态
            let appData = { categories: [] };
            let currentViewCategoryId = null;  // 当前正在管理文章的分类ID
            let selectedAdminCategoryId = null; // 管理面板中选中的分类

            // 工具函数：生成简单ID
            function generateId() {
                return Date.now().toString(36) + Math.random().toString(36).substr(2, 6);
            }

            // 从localStorage加载数据
            function loadData() {
                const stored = localStorage.getItem(STORAGE_KEY);
                if (stored) {
                    try {
                        appData = JSON.parse(stored);
                    } catch (e) {
                        appData = JSON.parse(JSON.stringify(DEFAULT_DATA));
                    }
                } else {
                    appData = JSON.parse(JSON.stringify(DEFAULT_DATA));
                }
            }

            // 保存数据到localStorage
            function saveData() {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(appData));
            }

            // 重置为默认数据（调试用，可调用）
            function resetToDefault() {
                appData = JSON.parse(JSON.stringify(DEFAULT_DATA));
                saveData();
            }

            // 渲染分类卡片
            function renderCategories() {
                const grid = document.getElementById('categoryGrid');
                if (!grid) return;
                if (appData.categories.length === 0) {
                    grid.innerHTML = `<div class="empty-tip" style="grid-column: span 2;">暂无分类，请点击底部“管理”添加</div>`;
                    return;
                }
                grid.innerHTML = appData.categories.map(cat => {
                    const icon = cat.name.length > 0 ? cat.name.charAt(0) : '📌';
                    return `
                        <div class="category-card" data-cat-id="${cat.id}">
                            <div class="icon">${getRandomIcon(cat.id)}</div>
                            <div class="name">${escapeHtml(cat.name)}</div>
                        </div>
                    `;
                }).join('');
                
                // 绑定点击事件
                document.querySelectorAll('.category-card').forEach(card => {
                    card.addEventListener('click', function() {
                        const catId = this.getAttribute('data-cat-id');
                        showArticles(catId);
                    });
                });
            }

            function getRandomIcon(seed) {
                const icons = ['📁', '📂', '📌', '📎', '🔖', '📋', '📝', '✨', '💡', '🔍'];
                let hash = 0;
                for (let i = 0; i < seed.length; i++) {
                    hash = seed.charCodeAt(i) + ((hash << 5) - hash);
                }
                return icons[Math.abs(hash) % icons.length];
            }

            function escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }

            // 显示文章列表
            function showArticles(catId) {
                const category = appData.categories.find(c => c.id === catId);
                if (!category) return;
                
                document.getElementById('view-categories').style.display = 'none';
                document.getElementById('view-articles').style.display = 'block';
                document.getElementById('currentCategoryName').textContent = category.name;
                
                const list = document.getElementById('articleList');
                const emptyTip = document.getElementById('emptyArticles');
                
                if (category.articles.length === 0) {
                    list.innerHTML = '';
                    emptyTip.style.display = 'block';
                } else {
                    emptyTip.style.display = 'none';
                    list.innerHTML = category.articles.map(article => `
                        <li class="article-item">
                            <a href="${escapeHtml(article.url)}" target="_blank" rel="noopener">
                                <span>${escapeHtml(article.title)}</span>
                                <span class="arrow">›</span>
                            </a>
                        </li>
                    `).join('');
                    
                    // 为每个链接添加点击监听（防止微信内跳转问题，直接允许）
                }
            }

            // 返回分类列表
            function backToCategories() {
                document.getElementById('view-articles').style.display = 'none';
                document.getElementById('view-categories').style.display = 'block';
                renderCategories(); // 刷新可能的数据
            }

            // 管理面板：渲染分类列表
            function renderAdminCategories() {
                const list = document.getElementById('adminCategoryList');
                if (appData.categories.length === 0) {
                    list.innerHTML = '<li style="color:#999; justify-content:center;">暂无分类</li>';
                } else {
                    list.innerHTML = appData.categories.map(cat => `
                        <li>
                            <span>${escapeHtml(cat.name)} <span class="admin-badge">${cat.articles.length}篇</span></span>
                            <div class="flex-row">
                                <button class="small-btn" data-manage-cat="${cat.id}">管理文章</button>
                                <button class="small-btn danger" data-delete-cat="${cat.id}">删除</button>
                            </div>
                        </li>
                    `).join('');
                }
                
                // 绑定事件
                document.querySelectorAll('[data-manage-cat]').forEach(btn => {
                    btn.addEventListener('click', function(e) {
                        e.stopPropagation();
                        const catId = this.getAttribute('data-manage-cat');
                        openArticleManager(catId);
                    });
                });
                document.querySelectorAll('[data-delete-cat]').forEach(btn => {
                    btn.addEventListener('click', function(e) {
                        e.stopPropagation();
                        const catId = this.getAttribute('data-delete-cat');
                        if (confirm('确定删除该分类及其所有文章吗？')) {
                            appData.categories = appData.categories.filter(c => c.id !== catId);
                            saveData();
                            renderAdminCategories();
                            renderCategories();
                            // 如果当前正在管理该分类的文章，返回列表
                            if (selectedAdminCategoryId === catId) {
                                backToCategorySelection();
                            }
                        }
                    });
                });
            }

            // 进入文章管理界面
            function openArticleManager(catId) {
                const category = appData.categories.find(c => c.id === catId);
                if (!category) return;
                selectedAdminCategoryId = catId;
                document.getElementById('adminCurrentCat').textContent = category.name;
                document.getElementById('articleAdminSection').style.display = 'block';
                // 隐藏分类管理区域？保留，但用户可看到上方分类管理，我们也可以做切换。为清晰，隐藏分类列表部分不太合适，设计为两个区域上下排列。保持可见。
                renderAdminArticles();
            }

            function backToCategorySelection() {
                selectedAdminCategoryId = null;
                document.getElementById('articleAdminSection').style.display = 'none';
                document.getElementById('adminCurrentCat').textContent = '';
            }

            function renderAdminArticles() {
                if (!selectedAdminCategoryId) return;
                const category = appData.categories.find(c => c.id === selectedAdminCategoryId);
                if (!category) return;
                const list = document.getElementById('adminArticleList');
                if (category.articles.length === 0) {
                    list.innerHTML = '<li style="color:#999; justify-content:center;">暂无文章</li>';
                } else {
                    list.innerHTML = category.articles.map(article => `
                        <li>
                            <span style="flex:1; word-break:break-all;">${escapeHtml(article.title)}</span>
                            <button class="small-btn danger" data-delete-article="${article.id}">删除</button>
                        </li>
                    `).join('');
                }
                document.querySelectorAll('[data-delete-article]').forEach(btn => {
                    btn.addEventListener('click', function() {
                        const articleId = this.getAttribute('data-delete-article');
                        if (confirm('确定删除这篇文章吗？')) {
                            const cat = appData.categories.find(c => c.id === selectedAdminCategoryId);
                            if (cat) {
                                cat.articles = cat.articles.filter(a => a.id !== articleId);
                                saveData();
                                renderAdminArticles();
                                renderAdminCategories(); // 更新文章计数
                                renderCategories();
                            }
                        }
                    });
                });
            }

            // 添加分类
            function addCategory() {
                const input = document.getElementById('newCategoryName');
                const name = input.value.trim();
                if (!name) {
                    alert('请输入分类名称');
                    return;
                }
                appData.categories.push({
                    id: generateId(),
                    name: name,
                    articles: []
                });
                saveData();
                input.value = '';
                renderAdminCategories();
                renderCategories();
            }

            // 添加文章
            function addArticle() {
                if (!selectedAdminCategoryId) {
                    alert('请先在分类列表中点击“管理文章”选择一个分类');
                    return;
                }
                const titleInput = document.getElementById('newArticleTitle');
                const urlInput = document.getElementById('newArticleUrl');
                const title = titleInput.value.trim();
                let url = urlInput.value.trim();
                
                if (!title || !url) {
                    alert('请填写文章标题和链接');
                    return;
                }
                // 简单校验链接格式
                if (!url.startsWith('http://') && !url.startsWith('https://')) {
                    alert('链接需要以 http:// 或 https:// 开头');
                    return;
                }
                
                const category = appData.categories.find(c => c.id === selectedAdminCategoryId);
                if (category) {
                    category.articles.push({
                        id: generateId(),
                        title: title,
                        url: url
                    });
                    saveData();
                    titleInput.value = '';
                    urlInput.value = '';
                    renderAdminArticles();
                    renderAdminCategories();
                    renderCategories();
                }
            }

            // 密码验证
            function checkPassword() {
                const pwd = document.getElementById('passwordInput').value;
                if (pwd === ADMIN_PASSWORD) {
                    document.getElementById('passwordModal').classList.remove('active');
                    document.getElementById('passwordInput').value = '';
                    document.getElementById('pwdError').style.display = 'none';
                    openAdminPanel();
                } else {
                    document.getElementById('pwdError').style.display = 'block';
                }
            }

            function openAdminPanel() {
                document.getElementById('adminPanel').classList.add('active');
                renderAdminCategories();
                backToCategorySelection(); // 重置文章管理区
            }

            function closeAdminPanel() {
                document.getElementById('adminPanel').classList.remove('active');
                renderCategories(); // 返回时刷新主页面
            }

            // 事件绑定
            function bindEvents() {
                document.getElementById('backToCategories').addEventListener('click', backToCategories);
                
                document.getElementById('openAdminBtn').addEventListener('click', function() {
                    document.getElementById('passwordModal').classList.add('active');
                    document.getElementById('passwordInput').focus();
                });
                
                document.getElementById('confirmPassword').addEventListener('click', checkPassword);
                document.getElementById('passwordInput').addEventListener('keypress', function(e) {
                    if (e.key === 'Enter') checkPassword();
                });
                
                // 点击模态框背景关闭
                document.getElementById('passwordModal').addEventListener('click', function(e) {
                    if (e.target === this) {
                        this.classList.remove('active');
                        document.getElementById('passwordInput').value = '';
                        document.getElementById('pwdError').style.display = 'none';
                    }
                });
                
                document.getElementById('closeAdminBtn').addEventListener('click', closeAdminPanel);
                
                document.getElementById('addCategoryBtn').addEventListener('click', addCategory);
                document.getElementById('newCategoryName').addEventListener('keypress', function(e) {
                    if (e.key === 'Enter') addCategory();
                });
                
                document.getElementById('addArticleBtn').addEventListener('click', addArticle);
                document.getElementById('newArticleUrl').addEventListener('keypress', function(e) {
                    if (e.key === 'Enter') addArticle();
                });
                
                document.getElementById('backToCatList').addEventListener('click', backToCategorySelection);
                
                // 允许在密码弹窗按ESC关闭（简单处理）
                document.addEventListener('keydown', function(e) {
                    if (e.key === 'Escape') {
                        if (document.getElementById('passwordModal').classList.contains('active')) {
                            document.getElementById('passwordModal').classList.remove('active');
                            document.getElementById('passwordInput').value = '';
                            document.getElementById('pwdError').style.display = 'none';
                        }
                    }
                });
            }

            // 初始化
            function init() {
                loadData();
                renderCategories();
                bindEvents();
            }

            init();
        })();
    </script>
</body>
</html>
