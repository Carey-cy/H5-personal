<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>公众号文章索引</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f5f5f5;
            color: #333;
            min-height: 100vh;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px 16px;
            background-color: #fff;
            min-height: 100vh;
        }
        .header {
            text-align: center;
            padding: 30px 0 20px;
            border-bottom: 1px solid #eee;
            margin-bottom: 25px;
        }
        .header h1 {
            font-size: 24px;
            font-weight: 600;
            color: #1a1a1a;
            letter-spacing: 1px;
        }
        .header p {
            font-size: 13px;
            color: #999;
            margin-top: 6px;
        }
        /* 分类网格（适用于一级和二级分类） */
        .category-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }
        .category-card {
            background: #ffffff;
            border: 1px solid #e8e8e8;
            border-radius: 12px;
            padding: 20px 10px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
            transition: all 0.2s ease;
            cursor: pointer;
            word-break: break-word;
        }
        .category-card:active {
            transform: scale(0.97);
            background-color: #f9f9f9;
            border-color: #d0d0d0;
        }
        .category-card .icon {
            font-size: 28px;
            margin-bottom: 8px;
        }
        .category-card .name {
            font-size: 16px;
            font-weight: 500;
            color: #2c3e50;
        }
        .back-btn {
            display: inline-block;
            padding: 8px 16px;
            font-size: 15px;
            color: #576b95;
            margin-bottom: 20px;
            cursor: pointer;
            border-radius: 20px;
            background: #f0f3fa;
            border: none;
        }
        .back-btn:active {
            background: #e1e6f0;
        }
        .category-title {
            font-size: 22px;
            font-weight: 600;
            margin: 10px 0 20px;
            padding-bottom: 12px;
            border-bottom: 2px solid #f0f0f0;
        }
        .article-list {
            list-style: none;
        }
        .article-item {
            padding: 16px 12px;
            border-bottom: 1px solid #f5f5f5;
            transition: background 0.1s;
            cursor: pointer;
        }
        .article-item:active {
            background-color: #f9f9f9;
        }
        .article-item a {
            text-decoration: none;
            color: #2c3e50;
            font-size: 16px;
            font-weight: 500;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .article-item .arrow {
            color: #b0b0b0;
            font-size: 16px;
            margin-left: 8px;
            flex-shrink: 0;
        }
        .empty-tip {
            text-align: center;
            color: #aaa;
            padding: 60px 0;
            font-size: 15px;
            grid-column: span 2;
        }
        .admin-entry {
            text-align: center;
            margin-top: 30px;
            padding: 20px 0;
            color: #ccc;
            font-size: 13px;
            cursor: pointer;
            border-top: 1px solid #f0f0f0;
        }
        .admin-entry:active {
            color: #999;
        }
        /* 管理面板 */
        .admin-panel {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: white;
            z-index: 100;
            overflow-y: auto;
            padding: 20px 16px;
            display: none;
            flex-direction: column;
        }
        .admin-panel.active {
            display: flex;
        }
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid #eee;
        }
        .admin-header h3 {
            font-size: 20px;
            font-weight: 600;
        }
        .close-admin {
            font-size: 26px;
            cursor: pointer;
            color: #888;
            padding: 0 10px;
        }
        .admin-section {
            margin-bottom: 30px;
        }
        .admin-section h4 {
            font-size: 16px;
            margin-bottom: 12px;
            color: #555;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .input-group {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        .input-group input {
            flex: 1;
            min-width: 120px;
            padding: 12px 14px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 15px;
            background: #fafafa;
            outline: none;
            transition: border 0.2s;
        }
        .input-group input:focus {
            border-color: #07c160;
            background: #fff;
        }
        .btn {
            padding: 10px 18px;
            background: #07c160;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
        }
        .btn:active {
            background: #06ad56;
        }
        .btn-outline {
            background: white;
            color: #07c160;
            border: 1px solid #07c160;
        }
        .btn-danger {
            background: #ee5a5a;
            border: 1px solid #ee5a5a;
        }
        .admin-item-list {
            list-style: none;
            margin-top: 10px;
        }
        .admin-item-list li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 10px;
            background: #f9f9f9;
            border-radius: 8px;
            margin-bottom: 8px;
            font-size: 15px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .admin-badge {
            font-size: 12px;
            background: #e0e0e0;
            padding: 2px 8px;
            border-radius: 10px;
            margin-left: 8px;
        }
        .flex-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .small-btn {
            padding: 5px 12px;
            font-size: 13px;
            border-radius: 6px;
            border: 1px solid #ddd;
            background: white;
            cursor: pointer;
        }
        .small-btn.danger {
            color: #ee5a5a;
            border-color: #ee5a5a;
        }
        .password-modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 200;
            display: none;
        }
        .password-modal.active {
            display: flex;
        }
        .password-box {
            background: white;
            border-radius: 16px;
            padding: 25px 20px;
            width: 280px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }
        .password-box input {
            width: 100%;
            padding: 12px;
            margin: 15px 0;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            outline: none;
        }
        .note {
            font-size: 12px;
            color: #999;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container" id="app">
        <!-- 主视图：一级分类列表 -->
        <div id="view-categories">
            <div class="header">
                <h1>📚 文章索引</h1>
                <p>点击大分类浏览子分类</p>
            </div>
            <div class="category-grid" id="mainCategoryGrid"></div>
            <div class="admin-entry" id="openAdminBtn">⚙️ 管理</div>
        </div>

        <!-- 二级分类视图 -->
        <div id="view-subcategories" style="display: none;">
            <button class="back-btn" id="backToMainCategories">← 返回大分类</button>
            <div class="category-title" id="currentMainCategoryName"></div>
            <div class="category-grid" id="subCategoryGrid"></div>
            <div class="empty-tip" id="emptySubCategories" style="display: none; grid-column: span 2;">该分类下暂无子分类</div>
        </div>

        <!-- 文章列表视图 -->
        <div id="view-articles" style="display: none;">
            <button class="back-btn" id="backToSubCategories">← 返回子分类</button>
            <div class="category-title" id="currentSubCategoryName"></div>
            <ul class="article-list" id="articleList"></ul>
            <div class="empty-tip" id="emptyArticles" style="display: none;">暂无文章</div>
        </div>
    </div>

    <!-- 管理面板 -->
    <div class="admin-panel" id="adminPanel">
        <div class="admin-header">
            <h3>📝 内容管理</h3>
            <span class="close-admin" id="closeAdminBtn">✕</span>
        </div>

        <!-- 一级分类管理 -->
        <div class="admin-section" id="mainCatSection">
            <h4>📁 大分类管理</h4>
            <div class="input-group">
                <input type="text" id="newMainCategoryName" placeholder="输入大分类名称">
                <button class="btn" id="addMainCategoryBtn">添加</button>
            </div>
            <ul class="admin-item-list" id="adminMainCategoryList"></ul>
        </div>

        <!-- 二级分类管理区域，默认隐藏，选择大分类后显示 -->
        <div class="admin-section" id="subCatSection" style="display: none;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                <h4>📂 管理【<span id="adminCurrentMainCat"></span>】的子分类</h4>
                <button class="btn btn-outline" id="backToMainCatList">← 选择其他</button>
            </div>
            <div class="input-group">
                <input type="text" id="newSubCategoryName" placeholder="输入子分类名称">
                <button class="btn" id="addSubCategoryBtn">添加子分类</button>
            </div>
            <ul class="admin-item-list" id="adminSubCategoryList"></ul>
        </div>

        <!-- 文章管理区域，默认隐藏，选择子分类后显示 -->
        <div class="admin-section" id="articleAdminSection" style="display: none;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                <h4>📄 管理【<span id="adminCurrentSubCat"></span>】的文章</h4>
                <button class="btn btn-outline" id="backToSubCatList">← 选择其他</button>
            </div>
            <div class="input-group">
                <input type="text" id="newArticleTitle" placeholder="文章标题">
                <input type="url" id="newArticleUrl" placeholder="公众号链接 https://...">
                <button class="btn" id="addArticleBtn">添加文章</button>
            </div>
            <ul class="admin-item-list" id="adminArticleList"></ul>
        </div>
    </div>

    <!-- 密码弹窗 -->
    <div class="password-modal" id="passwordModal">
        <div class="password-box">
            <h3>管理验证</h3>
            <input type="password" id="passwordInput" placeholder="请输入管理密码">
            <button class="btn" id="confirmPassword">确 认</button>
            <div class="note" id="pwdError" style="color:#ee5a5a; display:none;">密码错误</div>
        </div>
    </div>

    <script>
        (function() {
            const ADMIN_PASSWORD = 'admin123';
            const STORAGE_KEY = 'wx_article_index_data_v2';

            // 默认示例数据（两层分类）
            const DEFAULT_DATA = {
                mainCategories: [
                    {
                        id: 'mc1',
                        name: '运营干货',
                        subCategories: [
                            {
                                id: 'sc1',
                                name: '排版技巧',
                                articles: [
                                    { id: 'a1', title: '新手公众号排版指南', url: 'https://mp.weixin.qq.com/s/example1' },
                                    { id: 'a2', title: '配图选择全攻略', url: 'https://mp.weixin.qq.com/s/example2' }
                                ]
                            },
                            {
                                id: 'sc2',
                                name: '涨粉方法',
                                articles: [
                                    { id: 'a3', title: '如何策划一场裂变活动', url: 'https://mp.weixin.qq.com/s/example3' }
                                ]
                            }
                        ]
                    },
                    {
                        id: 'mc2',
                        name: '产品动态',
                        subCategories: [
                            {
                                id: 'sc3',
                                name: '版本更新',
                                articles: [
                                    { id: 'a4', title: 'v2.0 重磅发布', url: 'https://mp.weixin.qq.com/s/example4' }
                                ]
                            }
                        ]
                    }
                ]
            };

            let appData = { mainCategories: [] };

            // 当前导航状态
            let currentMainCategoryId = null;   // 当前查看的一级分类ID
            let currentSubCategoryId = null;    // 当前查看的二级分类ID
            let adminSelectedMainId = null;     // 管理面板当前选中的一级分类
            let adminSelectedSubId = null;      // 管理面板当前选中的二级分类

            function generateId() {
                return Date.now().toString(36) + Math.random().toString(36).substr(2, 6);
            }

            function loadData() {
                const stored = localStorage.getItem(STORAGE_KEY);
                if (stored) {
                    try {
                        appData = JSON.parse(stored);
                    } catch (e) {
                        appData = JSON.parse(JSON.stringify(DEFAULT_DATA));
                    }
                } else {
                    appData = JSON.parse(JSON.stringify(DEFAULT_DATA));
                }
            }

            function saveData() {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(appData));
            }

            function escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }

            // ========== 前端显示渲染 ==========
            function renderMainCategories() {
                const grid = document.getElementById('mainCategoryGrid');
                if (appData.mainCategories.length === 0) {
                    grid.innerHTML = `<div class="empty-tip">暂无大分类，请点击底部“管理”添加</div>`;
                    return;
                }
                grid.innerHTML = appData.mainCategories.map(mc => `
                    <div class="category-card" data-main-id="${mc.id}">
                        <div class="icon">📖</div>
                        <div class="name">${escapeHtml(mc.name)}</div>
                    </div>
                `).join('');

                document.querySelectorAll('#mainCategoryGrid .category-card').forEach(card => {
                    card.addEventListener('click', function() {
                        const mainId = this.getAttribute('data-main-id');
                        showSubCategories(mainId);
                    });
                });
            }

            function showSubCategories(mainId) {
                const mainCat = appData.mainCategories.find(m => m.id === mainId);
                if (!mainCat) return;
                currentMainCategoryId = mainId;
                document.getElementById('view-categories').style.display = 'none';
                document.getElementById('view-subcategories').style.display = 'block';
                document.getElementById('currentMainCategoryName').textContent = mainCat.name;

                const grid = document.getElementById('subCategoryGrid');
                const emptyTip = document.getElementById('emptySubCategories');
                if (mainCat.subCategories.length === 0) {
                    grid.innerHTML = '';
                    emptyTip.style.display = 'block';
                } else {
                    emptyTip.style.display = 'none';
                    grid.innerHTML = mainCat.subCategories.map(sub => `
                        <div class="category-card" data-sub-id="${sub.id}">
                            <div class="icon">📖</div>
                            <div class="name">${escapeHtml(sub.name)}</div>
                        </div>
                    `).join('');

                    document.querySelectorAll('#subCategoryGrid .category-card').forEach(card => {
                        card.addEventListener('click', function() {
                            const subId = this.getAttribute('data-sub-id');
                            showArticles(subId);
                        });
                    });
                }
            }

            function showArticles(subId) {
                // 查找该子分类及其所属一级分类
                let foundSub = null;
                for (let main of appData.mainCategories) {
                    const sub = main.subCategories.find(s => s.id === subId);
                    if (sub) {
                        foundSub = sub;
                        currentMainCategoryId = main.id;
                        break;
                    }
                }
                if (!foundSub) return;
                currentSubCategoryId = subId;

                document.getElementById('view-subcategories').style.display = 'none';
                document.getElementById('view-articles').style.display = 'block';
                document.getElementById('currentSubCategoryName').textContent = foundSub.name;

                const list = document.getElementById('articleList');
                const empty = document.getElementById('emptyArticles');
                if (foundSub.articles.length === 0) {
                    list.innerHTML = '';
                    empty.style.display = 'block';
                } else {
                    empty.style.display = 'none';
                    list.innerHTML = foundSub.articles.map(article => `
                        <li class="article-item">
                            <a href="${escapeHtml(article.url)}" target="_blank" rel="noopener">
                                <span>${escapeHtml(article.title)}</span>
                                <span class="arrow">›</span>
                            </a>
                        </li>
                    `).join('');
                }
            }

            function backToMainCategories() {
                document.getElementById('view-subcategories').style.display = 'none';
                document.getElementById('view-articles').style.display = 'none';
                document.getElementById('view-categories').style.display = 'block';
                currentMainCategoryId = null;
                currentSubCategoryId = null;
                renderMainCategories();
            }

            function backToSubCategories() {
                if (!currentMainCategoryId) {
                    backToMainCategories();
                    return;
                }
                document.getElementById('view-articles').style.display = 'none';
                document.getElementById('view-subcategories').style.display = 'block';
                currentSubCategoryId = null;
                showSubCategories(currentMainCategoryId);
            }

            // ========== 管理面板渲染 ==========
            function renderAdminMainCategories() {
                const list = document.getElementById('adminMainCategoryList');
                if (appData.mainCategories.length === 0) {
                    list.innerHTML = '<li style="color:#999; justify-content:center;">暂无大分类</li>';
                } else {
                    list.innerHTML = appData.mainCategories.map(mc => `
                        <li>
                            <span>${escapeHtml(mc.name)} <span class="admin-badge">${mc.subCategories.length}个子分类</span></span>
                            <div class="flex-row">
                                <button class="small-btn" data-manage-main="${mc.id}">管理子分类</button>
                                <button class="small-btn danger" data-delete-main="${mc.id}">删除</button>
                            </div>
                        </li>
                    `).join('');
                }

                document.querySelectorAll('[data-manage-main]').forEach(btn => {
                    btn.addEventListener('click', function() {
                        const mainId = this.getAttribute('data-manage-main');
                        openSubCategoryManager(mainId);
                    });
                });
                document.querySelectorAll('[data-delete-main]').forEach(btn => {
                    btn.addEventListener('click', function() {
                        const mainId = this.getAttribute('data-delete-main');
                        if (confirm('确定删除该大分类及其所有子分类和文章吗？')) {
                            appData.mainCategories = appData.mainCategories.filter(m => m.id !== mainId);
                            saveData();
                            renderAdminMainCategories();
                            renderMainCategories();
                            if (adminSelectedMainId === mainId) {
                                exitSubManager();
                            }
                        }
                    });
                });
            }

            function openSubCategoryManager(mainId) {
                const mainCat = appData.mainCategories.find(m => m.id === mainId);
                if (!mainCat) return;
                adminSelectedMainId = mainId;
                document.getElementById('adminCurrentMainCat').textContent = mainCat.name;
                document.getElementById('subCatSection').style.display = 'block';
                document.getElementById('articleAdminSection').style.display = 'none';
                renderAdminSubCategories();
            }

            function exitSubManager() {
                adminSelectedMainId = null;
                adminSelectedSubId = null;
                document.getElementById('subCatSection').style.display = 'none';
                document.getElementById('articleAdminSection').style.display = 'none';
            }

            function renderAdminSubCategories() {
                if (!adminSelectedMainId) return;
                const mainCat = appData.mainCategories.find(m => m.id === adminSelectedMainId);
                if (!mainCat) return;
                const list = document.getElementById('adminSubCategoryList');
                if (mainCat.subCategories.length === 0) {
                    list.innerHTML = '<li style="color:#999; justify-content:center;">暂无子分类</li>';
                } else {
                    list.innerHTML = mainCat.subCategories.map(sub => `
                        <li>
                            <span>${escapeHtml(sub.name)} <span class="admin-badge">${sub.articles.length}篇</span></span>
                            <div class="flex-row">
                                <button class="small-btn" data-manage-sub="${sub.id}">管理文章</button>
                                <button class="small-btn danger" data-delete-sub="${sub.id}">删除</button>
                            </div>
                        </li>
                    `).join('');
                }

                document.querySelectorAll('[data-manage-sub]').forEach(btn => {
                    btn.addEventListener('click', function() {
                        const subId = this.getAttribute('data-manage-sub');
                        openArticleManager(subId);
                    });
                });
                document.querySelectorAll('[data-delete-sub]').forEach(btn => {
                    btn.addEventListener('click', function() {
                        const subId = this.getAttribute('data-delete-sub');
                        if (confirm('确定删除该子分类及其所有文章吗？')) {
                            const main = appData.mainCategories.find(m => m.id === adminSelectedMainId);
                            if (main) {
                                main.subCategories = main.subCategories.filter(s => s.id !== subId);
                                saveData();
                                renderAdminSubCategories();
                                renderAdminMainCategories();
                                renderMainCategories();
                                if (adminSelectedSubId === subId) {
                                    exitArticleManager();
                                }
                            }
                        }
                    });
                });
            }

            function openArticleManager(subId) {
                if (!adminSelectedMainId) return;
                const mainCat = appData.mainCategories.find(m => m.id === adminSelectedMainId);
                if (!mainCat) return;
                const sub = mainCat.subCategories.find(s => s.id === subId);
                if (!sub) return;
                adminSelectedSubId = subId;
                document.getElementById('adminCurrentSubCat').textContent = sub.name;
                document.getElementById('articleAdminSection').style.display = 'block';
                renderAdminArticles();
            }

            function exitArticleManager() {
                adminSelectedSubId = null;
                document.getElementById('articleAdminSection').style.display = 'none';
                // 刷新子分类列表的文章计数
                renderAdminSubCategories();
                renderAdminMainCategories();
            }

            function renderAdminArticles() {
                if (!adminSelectedMainId || !adminSelectedSubId) return;
                const mainCat = appData.mainCategories.find(m => m.id === adminSelectedMainId);
                if (!mainCat) return;
                const sub = mainCat.subCategories.find(s => s.id === adminSelectedSubId);
                if (!sub) return;
                const list = document.getElementById('adminArticleList');
                if (sub.articles.length === 0) {
                    list.innerHTML = '<li style="color:#999; justify-content:center;">暂无文章</li>';
                } else {
                    list.innerHTML = sub.articles.map(article => `
                        <li>
                            <span style="flex:1; word-break:break-all;">${escapeHtml(article.title)}</span>
                            <button class="small-btn danger" data-delete-article="${article.id}">删除</button>
                        </li>
                    `).join('');
                }
                document.querySelectorAll('[data-delete-article]').forEach(btn => {
                    btn.addEventListener('click', function() {
                        const articleId = this.getAttribute('data-delete-article');
                        if (confirm('确定删除这篇文章吗？')) {
                            const main = appData.mainCategories.find(m => m.id === adminSelectedMainId);
                            if (main) {
                                const subCat = main.subCategories.find(s => s.id === adminSelectedSubId);
                                if (subCat) {
                                    subCat.articles = subCat.articles.filter(a => a.id !== articleId);
                                    saveData();
                                    renderAdminArticles();
                                    renderAdminSubCategories();
                                    renderAdminMainCategories();
                                    renderMainCategories();
                                }
                            }
                        }
                    });
                });
            }

            // 添加一级分类
            function addMainCategory() {
                const input = document.getElementById('newMainCategoryName');
                const name = input.value.trim();
                if (!name) { alert('请输入大分类名称'); return; }
                appData.mainCategories.push({
                    id: generateId(),
                    name: name,
                    subCategories: []
                });
                saveData();
                input.value = '';
                renderAdminMainCategories();
                renderMainCategories();
            }

            // 添加二级分类
            function addSubCategory() {
                if (!adminSelectedMainId) { alert('请先选择一个大分类'); return; }
                const input = document.getElementById('newSubCategoryName');
                const name = input.value.trim();
                if (!name) { alert('请输入子分类名称'); return; }
                const main = appData.mainCategories.find(m => m.id === adminSelectedMainId);
                if (main) {
                    main.subCategories.push({
                        id: generateId(),
                        name: name,
                        articles: []
                    });
                    saveData();
                    input.value = '';
                    renderAdminSubCategories();
                    renderAdminMainCategories();
                    renderMainCategories();
                }
            }

            // 添加文章
            function addArticle() {
                if (!adminSelectedMainId || !adminSelectedSubId) {
                    alert('请先选择一个大分类和子分类');
                    return;
                }
                const titleInput = document.getElementById('newArticleTitle');
                const urlInput = document.getElementById('newArticleUrl');
                const title = titleInput.value.trim();
                const url = urlInput.value.trim();
                if (!title || !url) { alert('请填写文章标题和链接'); return; }
                if (!url.startsWith('http://') && !url.startsWith('https://')) {
                    alert('链接需要以 http:// 或 https:// 开头');
                    return;
                }
                const main = appData.mainCategories.find(m => m.id === adminSelectedMainId);
                if (main) {
                    const sub = main.subCategories.find(s => s.id === adminSelectedSubId);
                    if (sub) {
                        sub.articles.push({
                            id: generateId(),
                            title: title,
                            url: url
                        });
                        saveData();
                        titleInput.value = '';
                        urlInput.value = '';
                        renderAdminArticles();
                        renderAdminSubCategories();
                        renderAdminMainCategories();
                        renderMainCategories();
                    }
                }
            }

            // 密码与面板控制
            function checkPassword() {
                const pwd = document.getElementById('passwordInput').value;
                if (pwd === ADMIN_PASSWORD) {
                    document.getElementById('passwordModal').classList.remove('active');
                    document.getElementById('passwordInput').value = '';
                    document.getElementById('pwdError').style.display = 'none';
                    openAdminPanel();
                } else {
                    document.getElementById('pwdError').style.display = 'block';
                }
            }

            function openAdminPanel() {
                document.getElementById('adminPanel').classList.add('active');
                // 重置管理状态
                adminSelectedMainId = null;
                adminSelectedSubId = null;
                document.getElementById('subCatSection').style.display = 'none';
                document.getElementById('articleAdminSection').style.display = 'none';
                renderAdminMainCategories();
            }

            function closeAdminPanel() {
                document.getElementById('adminPanel').classList.remove('active');
                renderMainCategories();
            }

            // 事件绑定
            function bindEvents() {
                document.getElementById('backToMainCategories').addEventListener('click', backToMainCategories);
                document.getElementById('backToSubCategories').addEventListener('click', backToSubCategories);

                document.getElementById('openAdminBtn').addEventListener('click', () => {
                    document.getElementById('passwordModal').classList.add('active');
                    document.getElementById('passwordInput').focus();
                });

                document.getElementById('confirmPassword').addEventListener('click', checkPassword);
                document.getElementById('passwordInput').addEventListener('keypress', e => {
                    if (e.key === 'Enter') checkPassword();
                });

                document.getElementById('passwordModal').addEventListener('click', function(e) {
                    if (e.target === this) {
                        this.classList.remove('active');
                        document.getElementById('passwordInput').value = '';
                        document.getElementById('pwdError').style.display = 'none';
                    }
                });

                document.getElementById('closeAdminBtn').addEventListener('click', closeAdminPanel);

                document.getElementById('addMainCategoryBtn').addEventListener('click', addMainCategory);
                document.getElementById('newMainCategoryName').addEventListener('keypress', e => {
                    if (e.key === 'Enter') addMainCategory();
                });

                document.getElementById('addSubCategoryBtn').addEventListener('click', addSubCategory);
                document.getElementById('newSubCategoryName').addEventListener('keypress', e => {
                    if (e.key === 'Enter') addSubCategory();
                });

                document.getElementById('addArticleBtn').addEventListener('click', addArticle);
                document.getElementById('newArticleUrl').addEventListener('keypress', e => {
                    if (e.key === 'Enter') addArticle();
                });

                document.getElementById('backToMainCatList').addEventListener('click', () => {
                    exitSubManager();
                    renderAdminMainCategories();
                });

                document.getElementById('backToSubCatList').addEventListener('click', () => {
                    exitArticleManager();
                    renderAdminSubCategories();
                });

                document.addEventListener('keydown', e => {
                    if (e.key === 'Escape') {
                        if (document.getElementById('passwordModal').classList.contains('active')) {
                            document.getElementById('passwordModal').classList.remove('active');
                            document.getElementById('passwordInput').value = '';
                            document.getElementById('pwdError').style.display = 'none';
                        }
                    }
                });
            }

            function init() {
                loadData();
                renderMainCategories();
                bindEvents();
            }

            init();
        })();
    </script>
</body>
</html>
